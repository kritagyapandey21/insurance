version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: crypto-insurance-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - insurance-network

  backend:
    build: ./backend
    container_name: crypto-insurance-backend
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGODB_URI=mongodb://admin:password123@mongodb:27017/crypto-insurance
      - FRONTEND_URL=http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - insurance-network
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  mongodb_data:

networks:
  insurance-network:
    driver: bridge
