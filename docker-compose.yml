version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: crypto-insurance-db
    environment:
      POSTGRES_USER: insurance_user
      POSTGRES_PASSWORD: StrongPass@123
      POSTGRES_DB: insurance_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - insurance-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insurance_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: crypto-insurance-backend
    environment:
      - NODE_ENV=development
      - PORT=5000
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=insurance_user
      - POSTGRES_PASSWORD=StrongPass@123
      - POSTGRES_DB=insurance_db
      - POSTGRES_SSL=false
      - FRONTEND_URL=http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - insurance-network
    volumes:
      - ./backend:/app
      - /app/node_modules

  nginx:
    image: nginx:1.25-alpine
    container_name: crypto-insurance-nginx
    ports:
      - "80:80"
    volumes:
      - ./mini-app:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
    networks:
      - insurance-network

volumes:
  postgres_data:

networks:
  insurance-network:
    driver: bridge
